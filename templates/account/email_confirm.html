{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm p-8 text-center">
  <h1 class="text-2xl font-bold">Confirm your email</h1>
  {% if confirmation %}
    <form method="post" action="{% url 'account_confirm_email' confirmation.key %}">
      {% csrf_token %}
      <button class="mt-6 bg-indigo-600 text-white font-semibold px-5 py-2 rounded-lg">Confirm</button>
    </form>
  {% else %}
    <p class="text-gray-500 mt-4">This link is invalid or has expired.</p>
  {% endif %}
</div>
{% endblock %}

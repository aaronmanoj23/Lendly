{% extends "base.html" %}
{% block title %}Sign up — Lendly{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm p-8">
  <h1 class="text-2xl font-bold">Sign up</h1>
  <p class="text-sm text-gray-500 mt-1">You'll need a valid .edu email address.</p>
  <form method="post" action="{% url 'account_signup' %}" class="mt-4 space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-lg hover:bg-indigo-700">Create account</button>
  </form>
  <p class="text-sm text-gray-500 mt-4">
    Already have an account? <a href="{% url 'account_login' %}" class="text-indigo-600">Log in</a>
  </p>
</div>
{% endblock %}

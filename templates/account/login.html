{% extends "base.html" %}
{% block title %}Log in — Lendly{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm p-8">
  <h1 class="text-2xl font-bold">Log in</h1>
  <form method="post" action="{% url 'account_login' %}" class="mt-4 space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-lg hover:bg-indigo-700">Log in</button>
  </form>
  <p class="text-sm text-gray-500 mt-4">
    No account? <a href="{% url 'account_signup' %}" class="text-indigo-600">Sign up</a>
  </p>
</div>
{% endblock %}

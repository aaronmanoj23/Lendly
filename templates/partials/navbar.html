{% load static %}
<nav class="bg-white border-b border-gray-100 sticky top-0 z-40" style="backdrop-filter: blur(12px); background: rgba(255,255,255,0.92);">
  <div class="max-w-6xl mx-auto px-5 py-0 flex items-center justify-between" style="height: 62px;">

    <a href="{% url 'home' %}" style="text-decoration: none; font-family: Georgia, 'Times New Roman', serif; font-size: 1.25rem; font-weight: 700; color: var(--indigo); letter-spacing: -0.01em;">lendly</a>

    <div class="hidden md:flex items-center gap-1">
      <a href="{% url 'browse' %}" style="padding: 0.4rem 0.875rem; font-size: 0.9rem; font-weight: 500; color: var(--text-secondary); border-radius: var(--radius-sm); text-decoration: none; transition: color 0.15s, background 0.15s;"
         onmouseover="this.style.color='var(--text-primary)';this.style.background='var(--surface)'"
         onmouseout="this.style.color='var(--text-secondary)';this.style.background='transparent'">
        Browse
      </a>
      {% if user.is_authenticated %}
        <a href="{% url 'create_listing' %}" style="padding: 0.4rem 0.875rem; font-size: 0.9rem; font-weight: 500; color: var(--text-secondary); border-radius: var(--radius-sm); text-decoration: none; transition: color 0.15s, background 0.15s;"
           onmouseover="this.style.color='var(--text-primary)';this.style.background='var(--surface)'"
           onmouseout="this.style.color='var(--text-secondary)';this.style.background='transparent'">
          List an item
        </a>
        <a href="{% url 'inbox' %}" style="padding: 0.4rem 0.875rem; font-size: 0.9rem; font-weight: 500; color: var(--text-secondary); border-radius: var(--radius-sm); text-decoration: none; transition: color 0.15s, background 0.15s;"
           onmouseover="this.style.color='var(--text-primary)';this.style.background='var(--surface)'"
           onmouseout="this.style.color='var(--text-secondary)';this.style.background='transparent'">
          Messages
        </a>
        <a href="{% url 'dashboard' %}" style="padding: 0.4rem 0.875rem; font-size: 0.9rem; font-weight: 500; color: var(--text-secondary); border-radius: var(--radius-sm); text-decoration: none; transition: color 0.15s, background 0.15s;"
           onmouseover="this.style.color='var(--text-primary)';this.style.background='var(--surface)'"
           onmouseout="this.style.color='var(--text-secondary)';this.style.background='transparent'">
          Dashboard
        </a>
        <div style="width:1px; height:20px; background:var(--border); margin: 0 6px;"></div>
        <a href="{% url 'profile' %}" style="display:flex; align-items:center; gap:7px; padding: 0.3rem 0.75rem 0.3rem 0.3rem; font-size: 0.875rem; font-weight: 500; color: var(--text-primary); border-radius: 999px; border: 1.5px solid var(--border); text-decoration: none; background: var(--white); transition: border-color 0.15s;"
           onmouseover="this.style.borderColor='var(--indigo)'"
           onmouseout="this.style.borderColor='var(--border)'">
          <span style="width:26px; height:26px; border-radius:50%; background:var(--indigo-light); color:var(--indigo); font-weight:700; font-size:0.75rem; display:flex; align-items:center; justify-content:center; font-family:var(--font-display);">
            {{ user.display_name|slice:":1"|upper }}
          </span>
          {{ user.display_name }}
        </a>
        <form method="post" action="{% url 'account_logout' %}" class="inline">
          {% csrf_token %}
          <button type="submit" style="padding: 0.4rem 0.875rem; font-size: 0.875rem; font-weight: 500; color: var(--text-muted); border-radius: var(--radius-sm); border: none; background: transparent; cursor: pointer; transition: color 0.15s;"
                  onmouseover="this.style.color='#DC2626'"
                  onmouseout="this.style.color='var(--text-muted)'">
            Log out
          </button>
        </form>
      {% else %}
        <a href="{% url 'account_login' %}" style="padding: 0.4rem 0.875rem; font-size: 0.9rem; font-weight: 500; color: var(--text-secondary); border-radius: var(--radius-sm); text-decoration: none; transition: color 0.15s, background 0.15s;"
           onmouseover="this.style.color='var(--text-primary)';this.style.background='var(--surface)'"
           onmouseout="this.style.color='var(--text-secondary)';this.style.background='transparent'">
          Log in
        </a>
        <a href="{% url 'account_signup' %}" class="btn-primary" style="font-size: 0.875rem; padding: 0.45rem 1.1rem;">
          Sign up free
        </a>
      {% endif %}
    </div>

  </div>
</nav>

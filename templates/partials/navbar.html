{% load static %}
<nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <a href="{% url 'home' %}" class="text-2xl font-bold text-indigo-600">Lendly</a>
    <div class="hidden md:flex items-center gap-6 text-sm font-medium">
      <a href="{% url 'browse' %}" class="hover:text-indigo-600">Browse</a>
      {% if user.is_authenticated %}
        <a href="{% url 'create_listing' %}" class="hover:text-indigo-600">List an item</a>
        <a href="{% url 'inbox' %}" class="hover:text-indigo-600">Messages</a>
        <a href="{% url 'dashboard' %}" class="hover:text-indigo-600">Dashboard</a>
        <a href="{% url 'profile' %}" class="hover:text-indigo-600">{{ user.display_name }}</a>
        <form method="post" action="{% url 'account_logout' %}" class="inline">
          {% csrf_token %}
          <button class="text-gray-500 hover:text-red-600" type="submit">Log out</button>
        </form>
      {% else %}
        <a href="{% url 'account_login' %}" class="hover:text-indigo-600">Log in</a>
        <a href="{% url 'account_signup' %}" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Sign up</a>
      {% endif %}
    </div>
  </div>
</nav>

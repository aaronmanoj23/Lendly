<a href="{{ listing.get_absolute_url }}" class="block group">
  <div class="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-lg transition-shadow">
    <div class="aspect-[4/3] bg-gray-100 overflow-hidden">
      {% if listing.primary_image %}
        <img src="{{ listing.primary_image }}" alt="{{ listing.title }}"
             class="w-full h-full object-cover group-hover:scale-105 transition-transform" />
      {% else %}
        <div class="w-full h-full flex items-center justify-center text-gray-400">No image</div>
      {% endif %}
    </div>
    <div class="p-4">
      <div class="flex justify-between items-start">
        <h3 class="font-semibold text-gray-900 line-clamp-1">{{ listing.title }}</h3>
        <span class="text-indigo-600 font-bold">${{ listing.price_per_day }}<span class="text-xs text-gray-500">/day</span></span>
      </div>
      <div class="text-sm text-gray-500 mt-1">{{ listing.campus.name }} · {{ listing.get_condition_display }}</div>
    </div>
  </div>
</a>

<a href="{{ listing.get_absolute_url }}" class="card-lift" style="display:block; text-decoration:none; background:var(--white); border:1.5px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; group;">

  {# Image #}
  <div style="aspect-ratio:4/3; background:var(--surface); overflow:hidden; position:relative;">
    {% if listing.primary_image %}
      <img src="{{ listing.primary_image }}" alt="{{ listing.title }}"
           style="width:100%; height:100%; object-fit:cover; transition:transform 0.35s cubic-bezier(0.22,1,0.36,1);"
           onmouseover="this.style.transform='scale(1.05)'"
           onmouseout="this.style.transform='scale(1)'" />
    {% else %}
      <div class="img-skeleton" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" style="opacity:0.25;"><rect x="4" y="8" width="28" height="20" rx="3" stroke="#6B7280" stroke-width="1.75"/><circle cx="13" cy="16" r="3" stroke="#6B7280" stroke-width="1.75"/><path d="M4 24l7-6 5 5 4-3 8 7" stroke="#6B7280" stroke-width="1.75" stroke-linejoin="round"/></svg>
      </div>
    {% endif %}

    {# Condition badge #}
    <span style="position:absolute; top:10px; left:10px; background:rgba(255,255,255,0.92); backdrop-filter:blur(6px); padding:3px 9px; border-radius:999px; font-size:0.7rem; font-weight:600; color:var(--text-secondary); letter-spacing:0.02em;">
      {{ listing.get_condition_display }}
    </span>
  </div>

  {# Info #}
  <div style="padding:1rem 1.125rem 1.125rem;">
    <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:0.375rem;">
      <h3 class="line-clamp-1" style="font-family:var(--font-display); font-size:0.9375rem; font-weight:600; color:var(--text-primary); margin:0; line-height:1.3; flex:1;">
        {{ listing.title }}
      </h3>
      <div style="text-align:right; flex-shrink:0;">
        <span style="font-family:var(--font-display); font-size:1rem; font-weight:700; color:var(--indigo);">${{ listing.price_per_day }}</span>
        <span style="font-size:0.7rem; color:var(--text-muted); display:block; line-height:1;">/day</span>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:5px; font-size:0.8rem; color:var(--text-muted);">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="flex-shrink:0;"><path d="M6 1a3.5 3.5 0 0 1 3.5 3.5C9.5 7.5 6 11 6 11S2.5 7.5 2.5 4.5A3.5 3.5 0 0 1 6 1Z" stroke="currentColor" stroke-width="1.25"/><circle cx="6" cy="4.5" r="1" fill="currentColor"/></svg>
      {{ listing.campus.name }}
    </div>
  </div>

</a>

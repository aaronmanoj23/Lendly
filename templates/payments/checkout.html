{% extends "base.html" %}
{% block title %}Checkout — Lendly{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm p-6">
  <h1 class="text-2xl font-bold">Checkout</h1>
  <div class="text-gray-500">{{ booking.listing.title }}</div>
  <div class="mt-4 text-3xl font-bold text-indigo-600">${{ booking.total_amount }}</div>
  <div class="text-sm text-gray-500">{{ booking.num_days }} days · {{ booking.start_date }} → {{ booking.end_date }}</div>
  <button id="pay-btn" data-booking="{{ booking.id }}"
          class="mt-6 w-full bg-indigo-600 text-white font-semibold py-3 rounded-lg hover:bg-indigo-700">
    Pay with Stripe
  </button>
</div>
{% endblock %}

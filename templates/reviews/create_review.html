{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm p-6">
  <h1 class="text-2xl font-bold">Leave a review</h1>
  <div class="text-gray-500">{{ booking.listing.title }}</div>
  <form method="post" class="mt-4 space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="bg-indigo-600 text-white font-semibold px-5 py-2 rounded-lg">Submit</button>
  </form>
</div>
{% endblock %}
